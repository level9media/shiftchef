name: iOS Build & Archive

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  XCODE_PROJECT: ios/App/App.xcodeproj
  XCODE_SCHEME: App

jobs:
  build:
    name: Build iOS .ipa
    runs-on: macos-14-xlarge
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / pnpm ───────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 3. Build web bundle ──────────────────────────────────────────────────
      - name: Build web bundle
        env:
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: https://manus.im
          VITE_FRONTEND_FORGE_API_URL: https://forge.manus.ai
          VITE_FRONTEND_FORGE_API_KEY: ${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}
          VITE_APP_TITLE: "ShiftChef - Find Food Service Jobs Fast!"
        run: rm -rf node_modules/.vite dist && pnpm run build:client

      # ── 4. Capacitor iOS ─────────────────────────────────────────────────────
      - name: Add Capacitor iOS platform
        run: npx cap add ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ── 5. Inject app icon ───────────────────────────────────────────────────
      - name: Inject app icon
        run: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          cp resources/ios/AppIcon.appiconset/*.png "$ICON_DIR/"
          cp resources/ios/AppIcon.appiconset/Contents.json "$ICON_DIR/"
          echo "Icon files injected: $(ls "$ICON_DIR/" | wc -l )"

      # ── 6. Inject splash screen ──────────────────────────────────────────────
      - name: Inject splash screen
        run: |
          set -e
          SPLASH_DIR="ios/App/App/Assets.xcassets/Splash.imageset"
          mkdir -p "$SPLASH_DIR"
          python3 scripts/gen-splash.py
          cat > "$SPLASH_DIR/Contents.json" << 'EOF'
          {
            "images": [
              { "idiom": "universal", "filename": "splash.png", "scale": "1x" },
              { "idiom": "universal", "scale": "2x" },
              { "idiom": "universal", "scale": "3x" }
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF
          echo "Splash screen injected"

      # ── 7. Inject deep link URL scheme ───────────────────────────────────────
      - name: Inject deep link URL scheme into Info.plist
        run: |
          set -e
          INFO_PLIST="ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string co.shiftchef.app" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string shiftchef" "$INFO_PLIST"
          echo "URL scheme injected"

      # ── 8. Increment build number ────────────────────────────────────────────
      - name: Increment build number
        run: |
          set -e
          BUILD_NUM=${{ github.run_number }}
          echo "Setting CFBundleVersion to $BUILD_NUM"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist

      # ── 9. Import code-signing certificate ───────────────────────────────────
      - name: Import code-signing certificate
        env:
          CERT_P12: ${{ secrets.CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
        run: |
          set -e
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          echo "p12 size: $(wc -c < /tmp/cert.p12) bytes"

          security create-keychain -p "temp_keychain_pass" signing_temp.keychain
          security set-keychain-settings -lut 21600 signing_temp.keychain
          security unlock-keychain -p "temp_keychain_pass" signing_temp.keychain

          security import /tmp/cert.p12 \
            -k signing_temp.keychain \
            -f pkcs12 \
            -A \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -P "${CERT_PASSWORD}"

          security list-keychains -d user -s signing_temp.keychain $(security list-keychains -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_keychain_pass" signing_temp.keychain
          echo "Certificate imported:"
          security find-identity -v -p codesigning signing_temp.keychain

      # ── 10. Install provisioning profile ─────────────────────────────────────
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          set -e
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist)
          echo "UUID:  $PROFILE_UUID"
          echo "Team:  $TEAM_ID"
          echo "Name:  $PROFILE_NAME"
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Profile installed"

      # ── 11. Build & Archive (Xcode) ──────────────────────────────────────────
      - name: Build & Archive (Xcode)
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          set -e
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)

          mkdir -p /tmp/xcodebuild_logs

          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath /tmp/ShiftChef.xcarchive \
            -configuration Release \
            -destination "generic/platform=iOS" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            OTHER_CODE_SIGN_FLAGS="--keychain signing_temp.keychain" \
            archive \
            2>&1 | tee /tmp/xcodebuild_logs/archive.log | tail -50

      # ── 12. Write ExportOptions.plist ────────────────────────────────────────
      - name: Write ExportOptions.plist
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          set -e
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>co.shiftchef.app</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF
          echo "ExportOptions.plist written"

      # ── 13. Export .ipa ──────────────────────────────────────────────────────
      - name: Export .ipa
        run: |
          set -e
          xcodebuild -exportArchive \
            -archivePath /tmp/ShiftChef.xcarchive \
            -exportPath /tmp/ShiftChef-ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            2>&1 | tee /tmp/xcodebuild_logs/export.log | tail -20
          echo "IPA exported:"
          ls -lh /tmp/ShiftChef-ipa/

      # ── 14. Upload .ipa artifact ─────────────────────────────────────────────
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShiftChef-${{ github.run_number }}.ipa
          path: /tmp/ShiftChef-ipa/*.ipa
          retention-days: 14

      # ── 15. Submit to TestFlight ─────────────────────────────────────────────
      - name: Submit to TestFlight
        env:
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Uploading to TestFlight..."
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/ShiftChef-ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose
