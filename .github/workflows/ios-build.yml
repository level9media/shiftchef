name: iOS Build & Archive

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    name: Build iOS .ipa
    runs-on: macos-14
    timeout-minutes: 60

    env:
      XCODE_PROJECT: ios/App/App.xcodeproj
      XCODE_SCHEME: App

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node & pnpm ───────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── 3. Build Vite web bundle ─────────────────────────────────────────────
      - name: Build web bundle
        run: pnpm run build:client
        env:
          VITE_APP_TITLE: ShiftChef
          VITE_APP_LOGO: https://d2xsxph8kpxj0f.cloudfront.net/310519663450394445/5XtEwxhSav9aHUudDTD5pa/icon-512_d6867d62.png

      # ── 4. Add & Sync Capacitor iOS ──────────────────────────────────────────
      - name: Add Capacitor iOS platform
        run: npx cap add ios

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ── 5. Import Apple signing certs ────────────────────────────────────────
      - name: Import code-signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          p12-password: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

      # ── 6. Install provisioning profile ──────────────────────────────────────
      - name: Install provisioning profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/f5330e02-bffe-4c36-8cfd-36e3446214b0.mobileprovision
          echo "✅ Provisioning profile installed"

      # ── 7. Build & Archive ────────────────────────────────────────────────────
      - name: Build & Archive (Xcode)
        run: |
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/ShiftChef.xcarchive" \
            -destination "generic/platform=iOS" \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="f5330e02-bffe-4c36-8cfd-36e3446214b0" \
            PROVISIONING_PROFILE_SPECIFIER="ShiftChef App Store" \
            CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION=YES

      # ── 8. Export .ipa ────────────────────────────────────────────────────────
      - name: Write ExportOptions.plist
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>co.shiftchef.app</key>
              <string>ShiftChef App Store</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Export .ipa
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ShiftChef.xcarchive" \
            -exportPath "$RUNNER_TEMP/ShiftChef-ipa" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      # ── 9. Upload .ipa artifact ───────────────────────────────────────────────
      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShiftChef-${{ github.sha }}.ipa
          path: ${{ runner.temp }}/ShiftChef-ipa/*.ipa
          retention-days: 30

      # ── 10. Submit to TestFlight ──────────────────────────────────────────────
      - name: Submit to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/ShiftChef-ipa/ShiftChef.ipa" \
            --apiKey ${{ secrets.APPLE_APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APPLE_APP_STORE_CONNECT_ISSUER_ID }}
