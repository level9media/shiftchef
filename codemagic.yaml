workflows:
  ios-testflight:
    name: ShiftChef iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Apple API Key

    environment:
      node: v22.13.0
      xcode: latest
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: co.shiftchef.app
      vars:
        BUNDLE_ID: co.shiftchef.app
        XCODE_SCHEME: App
        XCODE_PROJECT: ios/App/App.xcodeproj
        VITE_APP_TITLE: ShiftChef

    scripts:
      - name: Install pnpm via npm
        script: |
          corepack disable
          npm install -g pnpm@10.4.1 --force
          pnpm --version

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Build web bundle
        script: pnpm run build:client

      - name: Add Capacitor iOS platform
        script: npx cap add ios

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build & Archive
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal Testers
