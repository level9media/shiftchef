workflows:
  ios-testflight:
    name: ShiftChef iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: v22.13.0
      xcode: latest
      cocoapods: default
      groups:
        - shiftchef_signing
      vars:
        BUNDLE_ID: co.shiftchef.app
        XCODE_SCHEME: App
        XCODE_PROJECT: ios/App/App.xcodeproj
        # Vite build-time env vars — baked into the iOS bundle at build time
        VITE_APP_ID: 5XtEwxhSav9aHUudDTD5pa
        VITE_OAUTH_PORTAL_URL: https://manus.im
        VITE_FRONTEND_FORGE_API_URL: https://forge.manus.ai
        VITE_FRONTEND_FORGE_API_KEY: ZokMKTeVAZLoS5fSEMvHMV
        VITE_APP_TITLE: ShiftChef - Find Food Service Jobs Fast!

    scripts:
      - name: Install pnpm via npm
        script: |
          corepack disable
          npm install -g pnpm@10.4.1 --force
          pnpm --version

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Build web bundle (with React singleton patch)
        script: pnpm run build:client

      - name: Add Capacitor iOS platform
        script: npx cap add ios

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Inject app icon
        script: |
          ICON_DIR="ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICON_DIR"
          cp resources/ios/AppIcon.appiconset/*.png "$ICON_DIR/"
          cp resources/ios/AppIcon.appiconset/Contents.json "$ICON_DIR/"
          echo "Icon files injected:"
          ls "$ICON_DIR/" | wc -l

      - name: Inject splash screen
        script: |
          set -e
          SPLASH_DIR="ios/App/App/Assets.xcassets/Splash.imageset"
          mkdir -p "$SPLASH_DIR"
          python3 scripts/gen-splash.py
          cat > "$SPLASH_DIR/Contents.json" << 'EOF'
          {
            "images": [
              { "idiom": "universal", "filename": "splash.png", "scale": "1x" },
              { "idiom": "universal", "scale": "2x" },
              { "idiom": "universal", "scale": "3x" }
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          EOF
          echo "Splash screen injected"

      - name: Inject deep link URL scheme into Info.plist
        script: |
          set -e
          INFO_PLIST="ios/App/App/Info.plist"
          echo "Injecting shiftchef:// URL scheme into $INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Delete :CFBundleURLTypes" "$INFO_PLIST" 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0 dict" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLName string co.shiftchef.app" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes array" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Add :CFBundleURLTypes:0:CFBundleURLSchemes:0 string shiftchef" "$INFO_PLIST"
          echo "URL scheme injected:"
          /usr/libexec/PlistBuddy -c "Print :CFBundleURLTypes" "$INFO_PLIST"

      - name: Increment build number
        script: |
          set -e
          # Use Codemagic's BUILD_NUMBER env var (auto-increments each build)
          # Falls back to current timestamp if not set
          BUILD_NUM=${BUILD_NUMBER:-$(date +%s)}
          echo "Setting CFBundleVersion to $BUILD_NUM"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Print :CFBundleVersion" ios/App/App/Info.plist

      - name: Setup signing, build and archive
        script: |
          set -e

          # ── 1. Install certificate ──────────────────────────────────────────
          echo "$CERT_P12" | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain \
            -P "$CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          echo "Certificate installed:"
          security find-identity -v -p codesigning build.keychain

          # ── 2. Install provisioning profile ────────────────────────────────
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"

          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c "Print :Name" /tmp/profile.plist)
          echo "UUID:  $PROFILE_UUID"
          echo "Team:  $TEAM_ID"
          echo "Name:  $PROFILE_NAME"

          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Profile installed ✓"

          # ── 3. Xcode archive ────────────────────────────────────────────────
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath /tmp/ShiftChef.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            archive

      - name: Export IPA
        script: |
          set -e
          echo "$PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          security cms -D -i /tmp/profile.mobileprovision > /tmp/profile.plist
          TEAM_ID=$(/usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /tmp/profile.plist)
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)

          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>co.shiftchef.app</key>
              <string>${PROFILE_UUID}</string>
            </dict>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath /tmp/ShiftChef.xcarchive \
            -exportPath /tmp/ShiftChef-ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload to TestFlight
        script: |
          set -e
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "AuthKey file written: AuthKey_${ASC_KEY_ID}.p8"
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/ShiftChef-ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

    artifacts:
      - /tmp/ShiftChef-ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
