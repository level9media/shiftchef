workflows:
  ios-testflight:
    name: ShiftChef iOS → TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: v22.13.0
      xcode: latest
      cocoapods: default
      groups:
        - shiftchef_signing
      vars:
        BUNDLE_ID: co.shiftchef.app
        XCODE_SCHEME: App
        XCODE_PROJECT: ios/App/App.xcodeproj

    scripts:
      - name: Install pnpm via npm
        script: |
          corepack disable
          npm install -g pnpm@10.4.1 --force
          pnpm --version

      - name: Install dependencies
        script: pnpm install --frozen-lockfile

      - name: Build web bundle
        script: pnpm run build:client

      - name: Add Capacitor iOS platform
        script: npx cap add ios

      - name: Sync Capacitor iOS
        script: npx cap sync ios

      - name: Install signing certificate
        script: |
          echo $CERT_P12 | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          echo "Certificate installed. Identities in keychain:"
          security find-identity -v -p codesigning build.keychain

      - name: Install provisioning profile
        script: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          # Extract UUID from the decoded profile
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw - 2>/dev/null || \
            /usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i /tmp/profile.mobileprovision)")
          echo "Profile UUID: $PROFILE_UUID"
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Profile installed at: ~/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build & Archive
        script: |
          # Get the UUID from the installed profile
          PROFILE_UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          echo "Using Profile UUID: $PROFILE_UUID"
          DEVELOPMENT_TEAM=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract TeamIdentifier.0 raw -)
          echo "Using Team ID: $DEVELOPMENT_TEAM"
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -archivePath /tmp/ShiftChef.xcarchive \
            -configuration Release \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="ShiftChef App Store" \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            archive

      - name: Export IPA
        script: |
          DEVELOPMENT_TEAM=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null | plutil -extract TeamIdentifier.0 raw -)
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>${DEVELOPMENT_TEAM}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>co.shiftchef.app</key>
              <string>ShiftChef App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath /tmp/ShiftChef.xcarchive \
            -exportPath /tmp/ShiftChef-ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist

      - name: Upload to TestFlight
        script: |
          xcrun altool --upload-app \
            --type ios \
            --file /tmp/ShiftChef-ipa/*.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"

    artifacts:
      - /tmp/ShiftChef-ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
